<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Explore solar energy solutions.">
  <title>Solar Energy</title>
  <style>
    * { box-sizing: border-box; }
    html, body { min-height: 100%; margin: 0; }
    body { display: grid; place-items: center; padding: 16px; background: #06111b; }

    .solar-card {
      position: relative;
      width: min(1200px, 100%);
      aspect-ratio: 1200 / 582;
      overflow: hidden;
      border-radius: 22px;
      perspective: 1000px;
      cursor: pointer;
      box-shadow: 0 0 0 rgba(46, 155, 255, 0);
      transition: box-shadow .4s ease;
    }
    .solar-card:hover, .solar-card.active {
      box-shadow: 0 20px 60px rgba(0, 0, 0, .5), 0 0 40px rgba(46, 155, 255, .35);
    }
    .solar-bg {
      display: block;
      width: 100%; height: 100%;
      object-fit: cover;
      transform: scale(1.02);
      transition: transform .15s ease-out;
      will-change: transform;
    }
    .solar-glow, .solar-scanline, .solar-particles { position: absolute; inset: 0; pointer-events: none; }
    .solar-glow {
      opacity: 0;
      background: radial-gradient(circle 220px at 50% 50%, rgba(46,155,255,.35), rgba(46,155,255,.08) 40%, transparent 70%);
      mix-blend-mode: screen;
      transition: opacity .3s ease;
    }
    .solar-card:hover .solar-glow, .solar-card.active .solar-glow { opacity: 1; }
    .solar-scanline {
      inset: auto 0;
      top: -5%; height: 2px;
      opacity: .85;
      background: linear-gradient(90deg, transparent, rgba(120,200,255,.9), transparent);
      box-shadow: 0 0 12px rgba(120,200,255,.8);
      animation: solar-scan 4.5s linear infinite;
    }
    @keyframes solar-scan { from { top: -5%; } to { top: 105%; } }
    .solar-particles { overflow: hidden; }
    .solar-spark {
      position: absolute; bottom: -10px;
      border-radius: 50%;
      background: rgba(180,220,255,.9);
      box-shadow: 0 0 8px 2px rgba(120,190,255,.8);
      animation: solar-float linear infinite;
      opacity: 0;
    }
    @keyframes solar-float {
      0% { transform: translate(0, 0); opacity: 0; }
      10% { opacity: 1; } 90% { opacity: .6; }
      100% { transform: translate(20px, -380px); opacity: 0; }
    }
    .solar-btn-hotspot {
      position: absolute;
      left: 7.8%; top: 78%; width: 21%; height: 8%;
      display: block;
      border-radius: 40px;
    }
    .solar-btn-ring {
      position: absolute; inset: -6px;
      border: 2px solid transparent;
      border-radius: 46px;
      transition: border-color .3s ease, box-shadow .3s ease, transform .3s ease;
    }
    .solar-btn-hotspot:hover .solar-btn-ring {
      border-color: rgba(120,200,255,.9);
      box-shadow: 0 0 18px rgba(46,155,255,.7), inset 0 0 12px rgba(46,155,255,.5);
      transform: scale(1.05);
    }
    .solar-btn-hotspot:active .solar-btn-ring { transform: scale(.97); }
    @media (max-width: 480px) { body { padding: 6px; } .solar-card { border-radius: 14px; } }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; } }
  </style>
</head>
<body>
  <main class="solar-card" id="solarCard">
    <img class="solar-bg" id="solarBg" src="AQUARIUM.png" alt="Clean energy, brighter tomorrow">
    <div class="solar-glow"></div>
    <div class="solar-scanline"></div>
    <div class="solar-particles" id="solarParticles"></div>
    <a class="solar-btn-hotspot" href="https://booklod.husayan.com/booking-form" aria-label="Explore solar solutions"><span class="solar-btn-ring"></span></a>
  </main>

  <script>
    (() => {
      const card = document.querySelector('#solarCard');
      const bg = document.querySelector('#solarBg');
      const glow = document.querySelector('.solar-glow');
      const particles = document.querySelector('#solarParticles');
      const move = (x, y) => {
        const r = card.getBoundingClientRect();
        const relX = (x - r.left) / r.width, relY = (y - r.top) / r.height;
        bg.style.transform = `scale(1.06) rotateX(${(0.5 - relY) * 8}deg) rotateY(${(relX - .5) * 10}deg)`;
        glow.style.background = `radial-gradient(circle 260px at ${relX * 100}% ${relY * 100}%, rgba(46,155,255,.4), rgba(46,155,255,.08) 40%, transparent 70%)`;
      };
      const reset = () => { card.classList.remove('active'); bg.style.transform = 'scale(1.02)'; };
      card.addEventListener('mousemove', e => { card.classList.add('active'); move(e.clientX, e.clientY); });
      card.addEventListener('mouseleave', reset);
      card.addEventListener('touchmove', e => { const t = e.touches[0]; if (t) { card.classList.add('active'); move(t.clientX, t.clientY); } }, { passive: true });
      card.addEventListener('touchend', reset);
      const addParticle = () => {
        const spark = document.createElement('i');
        const size = 2 + Math.random() * 3, duration = 4 + Math.random() * 4, delay = Math.random() * 2;
        spark.className = 'solar-spark';
        Object.assign(spark.style, { left: `${Math.random() * 100}%`, width: `${size}px`, height: `${size}px`, animationDuration: `${duration}s`, animationDelay: `${delay}s` });
        particles.append(spark);
        setTimeout(() => spark.remove(), (duration + delay) * 1000 + 200);
      };
      setInterval(addParticle, 350);
      for (let i = 0; i < 12; i++) setTimeout(addParticle, i * 150);
    })();
  </script>
</body>
</html>
